name: CI

on:
  pull_request:
    branches: [main, feat/content-generation]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Validate content data (no missing audio)
        run: npx ts-node scripts/validate-content.ts
