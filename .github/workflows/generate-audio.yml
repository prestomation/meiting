name: Generate Audio

# Generates missing TTS audio (Polly + ElevenLabs) and commits the resulting
# audio URLs back into src/data/hsk*.json. Runs in GitHub Actions because the
# Cloudflare/AWS/ElevenLabs secrets live in the repo, not in dev environments.
#
# Generation is content-addressed (see scripts/lib/voices.ts), so an identical
# file is never synthesized twice — re-runs are cheap no-ops.

on:
  push:
    paths:
      - 'src/data/hsk*.json'       # sentence data changed → new audio needed
      - 'scripts/lib/voices.ts'    # recipe changed → new CAS keys → may regenerate
  workflow_dispatch:
    inputs:
      level:
        description: 'HSK level to generate (or "all")'
        required: true
        default: 'all'
        type: choice
        options: ['all', '1', '2', '3', '4', '5', '6']
      voice:
        description: 'Voice to generate (or "all")'
        required: true
        default: 'all'
        type: choice
        options: ['all', 'polly-zhiyu', 'elevenlabs-haoran']
      limit:
        description: 'Max NEW files to synthesize per level/voice (0 = unlimited)'
        required: true
        default: '10'
        type: string

# One run per branch; a newer push/dispatch cancels an in-flight run on the same ref.
concurrency:
  group: generate-audio-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Skip cleanly (green) when the audio secrets aren't configured yet — e.g.
      # before the user adds them, or on forks. Avoids a spurious red X.
      - name: Check secrets
        id: check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::notice::Audio secrets not configured — skipping generation."
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.has_secrets == 'true'
        run: npm ci

      - name: Generate audio
        if: steps.check.outputs.has_secrets == 'true'
        env:
          # Cloudflare R2 (required for every voice)
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_R2_PUBLIC_BASE: ${{ secrets.CLOUDFLARE_R2_PUBLIC_BASE }}
          CLOUDFLARE_R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          # AWS Polly
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          # ElevenLabs
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          # Inputs (empty on push → defaults). While testing, cap NEW files per
          # level/voice to keep credit spend small; set to 0 for unlimited.
          INPUT_LEVEL: ${{ github.event.inputs.level || 'all' }}
          INPUT_VOICE: ${{ github.event.inputs.voice || 'all' }}
          INPUT_LIMIT: ${{ github.event.inputs.limit || '10' }}
        run: |
          set -euo pipefail

          # Resolve levels: explicit input, or discover from the data files present.
          if [ "$INPUT_LEVEL" = "all" ]; then
            LEVELS=$(ls src/data/hsk*.json 2>/dev/null \
              | sed -E 's#.*/hsk([0-9]+)\.json#\1#' | sort -n | tr '\n' ' ')
          else
            LEVELS="$INPUT_LEVEL"
          fi

          # Resolve voices: explicit input, or both.
          if [ "$INPUT_VOICE" = "all" ]; then
            VOICES="polly-zhiyu elevenlabs-haoran"
          else
            VOICES="$INPUT_VOICE"
          fi

          echo "Levels: $LEVELS"
          echo "Voices: $VOICES"
          echo "Per level/voice synthesis limit: $INPUT_LIMIT (0 = unlimited)"

          for L in $LEVELS; do
            [ -f "src/data/hsk${L}.json" ] || { echo "skip: hsk${L}.json not found"; continue; }
            for V in $VOICES; do
              echo "::group::HSK $L · $V"
              npx ts-node --project scripts/tsconfig.json scripts/audio.ts \
                --level "$L" --voice "$V" --limit "$INPUT_LIMIT"
              echo "::endgroup::"
            done
          done

      - name: Commit generated audio URLs
        if: steps.check.outputs.has_secrets == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/*.json
          if git diff --cached --quiet; then
            echo "No audio changes to commit."
            exit 0
          fi
          # No [skip ci]: pushes made with GITHUB_TOKEN don't trigger GitHub Actions
          # (so no generate-audio/test loop), but Cloudflare Pages DOES watch every
          # push — we want it to deploy the newly generated audio to the preview.
          git commit -m "chore: generate audio"
          git push origin "HEAD:${GITHUB_REF_NAME}"
